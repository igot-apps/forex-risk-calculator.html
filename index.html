
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forex Risk Calculator</title>

<style>
*{box-sizing:border-box;}

body{
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
  margin:0;
  padding:10px;
  display:flex;
  justify-content:center;
}

/* 📱 MOBILE 90% WIDTH FIX */
.card{
  background:#1e293b;
  padding:20px;
  border-radius:20px;
  width:90vw;           /* 🔥 90% of screen width */
  max-width:420px;
  min-height:90vh;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h2{text-align:center;font-size:20px;}

input,select{
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#0f172a;
  color:white;
  font-size:16px;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  margin-top:10px;
  cursor:pointer;
}

.calc{background:#22c55e;}
.reset{background:#ef4444;}

.toggle{
  display:flex;
  gap:10px;
  margin:10px 0;
}

.toggle button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#334155;
  color:white;
  cursor:pointer;
}

.active{background:#22c55e !important;}

.result{
  margin-top:15px;
  text-align:center;
}

.big{
  font-size:22px;
  font-weight:bold;
  color:#22c55e;
}

.error{color:#ef4444;}
</style>
</head>

<body>

<div class="card">

<h2>📊 Forex Risk Calculator</h2>

<!-- BUY / SELL -->
<div class="toggle">
  <button id="buyBtn" onclick="setDirection('buy')">BUY</button>
  <button id="sellBtn" onclick="setDirection('sell')">SELL</button>
</div>

<!-- MODE -->
<div class="toggle">
  <button id="modeRisk" onclick="setMode('risk')">Risk→SL</button>
  <button id="modeSL" onclick="setMode('sl')">SL→Risk</button>
  <button id="modeLot" onclick="setMode('lot')">Risk→LOT</button>
</div>

<!-- ACCOUNT -->
<div class="toggle">
  <button id="stdBtn" onclick="setAccount('standard')">Standard</button>
  <button id="centBtn" onclick="setAccount('cent')">Cent</button>
</div>

<label>Pair</label>
<select id="pair">
  <option>EURUSD</option>
  <option>GBPUSD</option>
  <option>USDJPY</option>
  <option>XAUUSD</option>
</select>

<label>Entry Price</label>
<input id="entry" type="number">

<label>Stop Loss</label>
<input id="sl" type="number">

<label>Lot Size</label>
<input id="lot" type="number" step="0.01">

<label>Risk ($)</label>
<input id="risk" type="number" step="0.01">

<button class="btn calc" onclick="calc()">Calculate</button>
<button class="btn reset" onclick="resetAll()">Reset</button>

<div class="result" id="out"></div>

</div>

<script>

let mode = "lot";
let direction = "buy";
let account = "standard";

/* =========================
   🔥 LOCAL STORAGE SAVE
========================= */
function saveState(){
  const state = {
    mode,
    direction,
    account,
    pair: document.getElementById("pair").value,
    entry: document.getElementById("entry").value,
    sl: document.getElementById("sl").value,
    lot: document.getElementById("lot").value,
    risk: document.getElementById("risk").value
  };

  localStorage.setItem("fx_calc_state", JSON.stringify(state));
}

/* =========================
   🔥 LOAD STATE
========================= */
function loadState(){
  const data = localStorage.getItem("fx_calc_state");
  if(!data) return;

  const s = JSON.parse(data);

  mode = s.mode || "lot";
  direction = s.direction || "buy";
  account = s.account || "standard";

  document.getElementById("pair").value = s.pair || "EURUSD";
  document.getElementById("entry").value = s.entry || "";
  document.getElementById("sl").value = s.sl || "";
  document.getElementById("lot").value = s.lot || "";
  document.getElementById("risk").value = s.risk || "";

  applyUI();
}

/* =========================
   ACCOUNT FACTOR (CENT FIX)
========================= */
function accountFactor(){
  return account === "cent" ? 100 : 1;
}

function pipMultiplier(pair){
  return pair.includes("JPY") ? 100 : 10000;
}

function pipValue(){
  return 10;
}

function riskPerLot(pair, diff){
  let value = (pair === "XAUUSD")
    ? diff * 100
    : pipValue() * diff * pipMultiplier(pair);

  return value / accountFactor();
}

/* =========================
   UI CONTROL
========================= */
function setMode(m){
  mode = m;
  applyUI();
  saveState();
}

function setDirection(d){
  direction = d;
  applyUI();
  saveState();
}

function setAccount(a){
  account = a;
  applyUI();
  saveState();
}

function applyUI(){

  // reset buttons
  ["modeRisk","modeSL","modeLot"].forEach(id=>{
    document.getElementById(id).classList.remove("active");
  });

  ["buyBtn","sellBtn","stdBtn","centBtn"].forEach(id=>{
    document.getElementById(id).classList.remove("active");
  });

  // mode highlight
  document.getElementById("mode"+capitalize(mode)).classList.add("active");

  // direction
  document.getElementById(direction+"Btn").classList.add("active");

  // account
  document.getElementById(account==="standard"?"stdBtn":"centBtn").classList.add("active");
}

function capitalize(s){
  return s.charAt(0).toUpperCase() + s.slice(1);
}

/* =========================
   RESET
========================= */
function resetAll(){
  localStorage.removeItem("fx_calc_state");

  document.getElementById("entry").value="";
  document.getElementById("sl").value="";
  document.getElementById("lot").value="";
  document.getElementById("risk").value="";
  document.getElementById("pair").value="EURUSD";

  out.innerHTML="";
}

/* =========================
   CALC
========================= */
function calc(){

  const pair = document.getElementById("pair").value;
  const entry = parseFloat(document.getElementById("entry").value);
  const sl = parseFloat(document.getElementById("sl").value);
  const lot = parseFloat(document.getElementById("lot").value);
  const risk = parseFloat(document.getElementById("risk").value);

  if(!entry){
    out.innerHTML = `<div class="error">Enter entry price</div>`;
    return;
  }

  /* SL → RISK */
  if(mode === "sl"){
    if(!lot || !sl){
      out.innerHTML = `<div class="error">Enter SL & Lot</div>`;
      return;
    }

    let diff = Math.abs(entry - sl);
    let loss = riskPerLot(pair, diff) * lot;

    out.innerHTML = `<div class="big">$${loss.toFixed(2)}</div>`;
  }

  /* RISK → SL */
  if(mode === "risk"){
    if(!lot || !risk){
      out.innerHTML = `<div class="error">Enter Risk & Lot</div>`;
      return;
    }

    let diffUnit = riskPerLot(pair, 1);
    let slMove = risk / (diffUnit * lot);

    let price = direction === "buy"
      ? entry - slMove
      : entry + slMove;

    out.innerHTML = `<div class="big">${price.toFixed(5)}</div>`;
  }

  /* RISK → LOT */
  if(mode === "lot"){
    if(!sl || !risk){
      out.innerHTML = `<div class="error">Enter SL & Risk</div>`;
      return;
    }

    let diff = Math.abs(entry - sl);
    let riskOneLot = riskPerLot(pair, diff);

    let lotSize = risk / riskOneLot;

    out.innerHTML = `<div class="big">${lotSize.toFixed(3)}</div>`;
  }

  saveState();
}

/* =========================
   INIT
========================= */
loadState();

</script>

</body>
</html>
