
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forex Risk Calculator</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

body{
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
  margin:0;
  padding:10px;
  display:flex;
  justify-content:center;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:20px;
  width:90vw;
  max-width:420px;
  min-height:90vh;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h2{text-align:center;font-size:20px;}

input,select{
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#0f172a;
  color:white;
  font-size:16px;
}

label{
  display:block;
  margin-top:6px;
  font-size:14px;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  margin-top:10px;
  cursor:pointer;
}

.calc{background:#22c55e;}
.reset{background:#ef4444;}

.toggle{
  display:flex;
  gap:10px;
  margin:10px 0;
}

.toggle button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#334155;
  color:white;
  cursor:pointer;
}

.active{background:#22c55e !important;}

.hidden{
  display:none !important;
}

.result{
  margin-top:15px;
  text-align:center;
}

.big{
  font-size:22px;
  font-weight:bold;
  color:#22c55e;
}
</style>
</head>

<body>

<div class="card">

<h2>📊 Forex Risk Calculator</h2>

<div class="toggle">
  <button onclick="setDirection('buy')" id="buyBtn">BUY</button>
  <button onclick="setDirection('sell')" id="sellBtn">SELL</button>
</div>

<div class="toggle">
  <button onclick="setMode('risk')" id="modeRisk">Risk→SL</button>
  <button onclick="setMode('sl')" id="modeSL">SL→Risk</button>
  <button onclick="setMode('lot')" id="modeLot">Risk→LOT</button>
</div>

<div class="toggle">
  <button onclick="setAccount('standard')" id="stdBtn">Standard</button>
  <button onclick="setAccount('cent')" id="centBtn">Cent</button>
</div>

<label>Pair</label>
<select id="pair">
  <option>EURUSD</option>
  <option>GBPUSD</option>
  <option>USDJPY</option>
  <option>XAUUSD</option>
</select>

<label>Entry Price</label>
<input id="entry" type="number">

<label id="slLabel">Stop Loss</label>
<input id="sl" type="number">

<label id="lotLabel">Lot Size</label>
<input id="lot" type="number" step="0.01">

<label id="riskLabel">Risk ($)</label>
<input id="risk" type="number" step="0.01">

<button class="btn calc" onclick="calc()">Calculate</button>
<button class="btn reset" onclick="resetAll()">Reset</button>

<div class="result" id="out"></div>

</div>

<script>

const STORAGE_KEY = "fx_calculator_v1";

let mode="lot";
let direction="buy";
let account="standard";

/* SAVE */
function saveState(){
  const data = {
    mode,
    direction,
    account,
    pair: pair.value,
    entry: entry.value,
    sl: sl.value,
    lot: lot.value,
    risk: risk.value
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

/* LOAD */
function loadState(){
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");

  mode = saved.mode || "lot";
  direction = saved.direction || "buy";
  account = saved.account || "standard";

  pair.value = saved.pair || "EURUSD";
  entry.value = saved.entry || "";
  sl.value = saved.sl || "";
  lot.value = saved.lot || "";
  risk.value = saved.risk || "";

  updateUI();
}

/* CENT LOGIC */
function accountMultiplier(){
  return account==="cent" ? 100 : 1;
}

/* PIP MODEL */
function pipMultiplier(pair){
  return pair.includes("JPY") ? 100 : 10000;
}

function pipValue(){
  return 10;
}

function riskPerLot(pair,diff){
  return pipValue() * pipMultiplier(pair) * diff;
}

/* EVENTS */
function setMode(m){ mode=m; updateUI(); saveState(); }
function setDirection(d){ direction=d; updateUI(); saveState(); }
function setAccount(a){ account=a; updateUI(); saveState(); }

/* UI */
function updateUI(){

  document.querySelectorAll(".toggle button").forEach(b=>b.classList.remove("active"));

  document.getElementById(mode==="risk"?"modeRisk":mode==="sl"?"modeSL":"modeLot").classList.add("active");
  document.getElementById(direction==="buy"?"buyBtn":"sellBtn").classList.add("active");
  document.getElementById(account==="cent"?"centBtn":"stdBtn").classList.add("active");

  // reset visibility
  sl.classList.remove("hidden");
  lot.classList.remove("hidden");
  risk.classList.remove("hidden");

  slLabel.classList.remove("hidden");
  lotLabel.classList.remove("hidden");
  riskLabel.classList.remove("hidden");

  if(mode==="risk"){
    lot.classList.add("hidden");
    lotLabel.classList.add("hidden");
  }

  if(mode==="sl"){
    risk.classList.add("hidden");
    riskLabel.classList.add("hidden");
  }

  if(mode==="lot"){
    lot.classList.add("hidden");
    lotLabel.classList.add("hidden");
  }

  out.innerHTML="";
}

/* RESET */
function resetAll(){
  localStorage.removeItem(STORAGE_KEY);

  entry.value="";
  sl.value="";
  lot.value="";
  risk.value="";
  out.innerHTML="";
}

/* CALC */
function calc(){

  let e=parseFloat(entry.value);
  let s=parseFloat(sl.value);
  let l=parseFloat(lot.value);
  let r=parseFloat(risk.value);

  let cent=accountMultiplier();

  if(!e){
    out.innerHTML="Enter Entry Price";
    return;
  }

  if(mode==="sl"){
    if(!l||!s){out.innerHTML="Enter SL & Lot";return;}
    let diff=Math.abs(e-s);
    let loss=riskPerLot(pair.value,diff)*l/cent;
    out.innerHTML=`<div class="big">$${loss.toFixed(2)}</div>`;
  }

  if(mode==="risk"){
    if(!l||!r){out.innerHTML="Enter Risk & Lot";return;}
    let slMove=(r*cent)/(riskPerLot(pair.value,1)*l);
    let price=direction==="buy"?e-slMove:e+slMove;
    out.innerHTML=`<div class="big">${price.toFixed(5)}</div>`;
  }

  if(mode==="lot"){
    if(!s||!r){out.innerHTML="Enter SL & Risk";return;}
    let diff=Math.abs(e-s);
    let lotSize=(r*cent)/riskPerLot(pair.value,diff);
    out.innerHTML=`<div class="big">${lotSize.toFixed(3)}</div>`;
  }

  saveState();
}

/* INIT */
loadState();

</script>

</body>
</html>
